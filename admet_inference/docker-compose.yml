services:
  admet-api:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: admet-inference-api
    
    ports:
      - "8000:8000"
    
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
    
    restart: unless-stopped
    
    # تحسين استهلاك الموارد ليعمل على جيت هاب وجهازك معاً
    deploy:
      resources:
        limits:
          cpus: '2'      # الحد الأقصى المسموح به
          memory: 6G     # جيت هاب بيعطي 7 جيجا، فـ 6 مناسبة جداً
        # تم حذف سطر الـ reservations تماماً لتجنب خطأ "No available CPUs"
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:latest
    container_name: admet-nginx
    
    ports:
      - "80:80"
    
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    
    depends_on:
      - admet-api
    
    restart: unless-stopped

volumes:
  models:
  logs: