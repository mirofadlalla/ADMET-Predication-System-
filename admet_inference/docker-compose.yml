version: '3.8'

services:
  admet-api:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: admet-inference-api
    
    ports:
      - "8000:8000"
    
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
    
    restart: unless-stopped
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Nginx reverse proxy for load balancing
  nginx:
    image: nginx:latest
    container_name: admet-nginx
    
    ports:
      - "80:80"
    
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    
    depends_on:
      - admet-api
    
    restart: unless-stopped

volumes:
  models:
  logs:
